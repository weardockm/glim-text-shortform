<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>글림 - 텍스트 숏폼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js" defer></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body,
      html {
        height: 100%;
        background-color: #050505;
        color: #f0f0f0;
        font-family: "Noto Serif KR", serif;
        overflow: hidden;
      }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        background: linear-gradient(to bottom, rgba(5, 5, 5, 0.9), transparent);
        pointer-events: none;
      }
      .logo {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 3px;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      }

      .app-view {
        display: none;
        height: 100vh;
        width: 100%;
        padding-bottom: 65px;
        overflow-y: auto;
      }
      .app-view.active {
        display: block;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      #view-home {
        padding-bottom: 0;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
        scrollbar-width: none;
      }
      #view-home::-webkit-scrollbar {
        display: none;
      }

      .post {
        height: 100vh;
        scroll-snap-align: start;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 2.5rem;
      }
      .text-content {
        font-size: 1.4rem;
        line-height: 1.8;
        text-align: center;
        word-break: keep-all;
        max-width: 450px;
        font-weight: 300;
        color: #eaeaea;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 1s ease-out,
          transform 1s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .post.is-visible .text-content {
        opacity: 1;
        transform: translateY(0);
      }

      .author-info {
        position: absolute;
        bottom: 90px;
        left: 20px;
        opacity: 0;
        transition: opacity 1.5s ease-out 0.3s;
      }
      .post.is-visible .author-info {
        opacity: 1;
      }
      .author-name {
        font-size: 0.95rem;
        font-weight: 300;
        color: #aaa;
        letter-spacing: 1px;
      }

      .side-actions {
        position: absolute;
        right: 15px;
        bottom: 90px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        opacity: 0;
        transition: opacity 1.5s ease-out 0.3s;
      }
      .post.is-visible .side-actions {
        opacity: 1;
      }
      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 1.5rem;
        cursor: pointer;
        user-select: none;
        color: #ccc;
        transition:
          color 0.3s ease,
          transform 0.2s ease;
      }
      .action-btn:active {
        transform: scale(0.8);
      }
      .action-btn:hover {
        color: #fff;
      }
      .action-count {
        font-size: 0.75rem;
        margin-top: 6px;
        color: #888;
        font-family: -apple-system, sans-serif;
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 65px;
        background: rgba(5, 5, 5, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 50;
        padding-bottom: env(safe-area-inset-bottom);
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #555;
        cursor: pointer;
        transition: color 0.3s;
        width: 20%;
      }
      .nav-item.active {
        color: #fff;
      }
      .nav-icon {
        font-size: 1.6rem;
        margin-bottom: 2px;
      }
      .nav-text {
        font-size: 0.65rem;
        font-family: -apple-system, sans-serif;
        font-weight: 300;
        letter-spacing: 0.5px;
      }
      .nav-item.write-btn {
        color: #fff;
      }
      .nav-item.write-btn .nav-icon {
        font-size: 2.2rem;
        background: transparent;
        color: #fff;
        transition: transform 0.2s ease;
      }
      .nav-item.write-btn:active .nav-icon {
        transform: scale(0.9);
      }

      .page-container {
        padding: 100px 25px 30px 25px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .page-title {
        font-size: 1.3rem;
        margin-bottom: 30px;
        font-weight: 400;
        color: #ddd;
        width: 100%;
        text-align: left;
      }

      .textarea-wrapper {
        position: relative;
        width: 100%;
        flex-grow: 1;
        margin-bottom: 20px;
      }
      .post-textarea {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 12px;
        color: #eee;
        padding: 20px;
        font-size: 1.2rem;
        font-family: "Noto Serif KR", serif;
        resize: none;
        line-height: 1.6;
      }
      .post-textarea:focus {
        outline: none;
        border-color: #555;
      }
      .char-count {
        position: absolute;
        bottom: 15px;
        right: 20px;
        font-size: 0.8rem;
        color: #666;
        font-family: -apple-system, sans-serif;
      }

      .auth-container {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
      }
      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border: none;
        padding: 14px 16px;
        border-radius: 12px;
        font-weight: 500;
        font-size: 1.05rem;
        cursor: pointer;
        margin-bottom: 12px;
        font-family: -apple-system, sans-serif;
        transition: transform 0.2s;
        position: relative;
      }
      .social-btn:active {
        transform: scale(0.98);
      }
      .social-icon {
        width: 20px;
        height: 20px;
        position: absolute;
        left: 20px;
      }
      .google-btn {
        background: #ffffff;
        color: #3c4043;
        border: 1px solid #dadce0;
      }
      .kakao-btn {
        background: #fee500;
        color: rgba(0, 0, 0, 0.85);
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: #555;
        margin: 20px 0;
        font-family: -apple-system, sans-serif;
        font-size: 0.9rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #333;
      }
      .divider:not(:empty)::before {
        margin-right: 0.25em;
      }
      .divider:not(:empty)::after {
        margin-left: 0.25em;
      }

      .auth-input {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 12px;
        color: #fff;
        padding: 16px;
        font-size: 1.05rem;
        margin-bottom: 15px;
        font-family: -apple-system, sans-serif;
      }
      .auth-input:focus {
        outline: none;
        border-color: #666;
      }
      .submit-btn {
        width: 100%;
        background: #fff;
        color: #000;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.05rem;
        cursor: pointer;
        font-family: "Noto Serif KR", serif;
        transition: transform 0.2s;
      }
      .submit-btn:active {
        transform: scale(0.98);
      }
      .secondary-btn {
        background: #222;
        color: #fff;
        margin-top: 15px;
      }

      #profileInfo {
        display: none;
        text-align: center;
        width: 100%;
      }
      .user-email {
        font-size: 1.4rem;
        margin-bottom: 30px;
        color: #ddd;
        font-weight: 300;
      }

      /* 💡 프로필 - 내가 쓴 글 리스트 스타일 */
      .my-posts-header {
        text-align: left;
        font-size: 1.1rem;
        color: #fff;
        margin: 30px 0 15px 0;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
      }
      #myPostsList {
        width: 100%;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding-bottom: 50px;
      }
      .my-post-item {
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .my-post-content {
        font-size: 0.95rem;
        color: #ccc;
        line-height: 1.5;
        width: 85%;
        white-space: pre-wrap;
      }
      .delete-post-btn {
        background: none;
        border: none;
        color: #ff3b30;
        cursor: pointer;
        padding: 5px;
        font-family: -apple-system, sans-serif;
        font-size: 0.85rem;
      }

      /* 공통 바텀 시트 */
      .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 75%;
        background-color: #111;
        border-radius: 24px 24px 0 0;
        z-index: 100;
        transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        padding: 30px 25px;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
        border-top: 1px solid #333;
        display: flex;
        flex-direction: column;
      }
      .bottom-sheet.open {
        bottom: 0;
      }
      .sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        flex-shrink: 0;
      }
      .sheet-title {
        font-size: 1.2rem;
        font-weight: 400;
        color: #ddd;
      }
      .close-btn {
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: #666;
        transition: color 0.2s;
      }

      /* 💡 댓글창 특화 스타일 */
      .comment-list {
        flex-grow: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-bottom: 20px;
        margin-bottom: 15px;
      }
      .comment-list::-webkit-scrollbar {
        display: none;
      }
      .comment-item {
        border-bottom: 1px solid #222;
        padding-bottom: 15px;
      }
      .comment-author {
        font-size: 0.85rem;
        color: #888;
        margin-bottom: 6px;
        font-family: -apple-system, sans-serif;
      }
      .comment-text {
        font-size: 1rem;
        color: #eee;
        line-height: 1.4;
      }
      .comment-input-area {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
        padding-bottom: env(safe-area-inset-bottom);
      }
      .comment-input {
        flex-grow: 1;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 20px;
        color: #fff;
        padding: 12px 18px;
        font-size: 0.95rem;
        font-family: -apple-system, sans-serif;
      }
      .comment-input:focus {
        outline: none;
        border-color: #666;
      }
      .comment-submit-btn {
        background: #fff;
        color: #000;
        border: none;
        border-radius: 20px;
        padding: 0 18px;
        font-weight: 600;
        cursor: pointer;
      }

      .coming-soon {
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #555;
        font-size: 1.1rem;
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">글림</div>
    </div>

    <div id="view-home" class="app-view active">
      <div id="postFeed">
        <div
          style="
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-weight: 300;
          "
        >
          깊은 문장을 불러오는 중...
        </div>
      </div>
    </div>

    <div id="view-explore" class="app-view">
      <div class="coming-soon">탐색 기능은 준비 중입니다.</div>
    </div>

    <div id="view-write" class="app-view">
      <div class="page-container">
        <div class="page-title">당신의 조각을 남겨주세요</div>
        <div class="textarea-wrapper">
          <textarea
            class="post-textarea"
            id="postContent"
            maxlength="300"
            placeholder="새벽에 어울리는 조용한 사유를 적어주세요."
            oninput="updateCharCount()"
          ></textarea>
          <div class="char-count" id="charCount">0 / 300</div>
        </div>
        <button class="submit-btn" onclick="submitPost()">우주로 띄우기</button>
      </div>
    </div>

    <div id="view-noti" class="app-view">
      <div class="coming-soon">알림 기능은 준비 중입니다.</div>
    </div>

    <div id="view-profile" class="app-view">
      <div class="page-container">
        <div class="page-title" id="authTitle">글림 시작하기</div>

        <div class="auth-container" id="authForm">
          <button
            class="social-btn google-btn"
            onclick="handleSocialLogin('google')"
          >
            <svg class="social-icon" viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              /></svg
            >Google로 계속하기
          </button>
          <button
            class="social-btn kakao-btn"
            onclick="handleSocialLogin('kakao')"
          >
            <svg class="social-icon" viewBox="0 0 24 24">
              <path
                d="M12 3c-5.52 0-10 3.58-10 8 0 2.82 1.83 5.3 4.58 6.71L5.5 22.5l5.24-3.53c.41.05.82.08 1.26.08 5.52 0 10-3.58 10-8s-4.48-8-10-8z"
                fill="#000000"
              /></svg
            >카카오 로그인
          </button>
          <div class="divider">또는 이메일로 시작하기</div>
          <input
            type="email"
            id="emailInput"
            class="auth-input"
            placeholder="이메일 주소"
          />
          <input
            type="password"
            id="passwordInput"
            class="auth-input"
            placeholder="비밀번호 (6자리 이상)"
          />
          <button class="submit-btn" onclick="handleSignIn()">
            이메일 로그인
          </button>
          <button class="submit-btn secondary-btn" onclick="handleSignUp()">
            10초 만에 가입하기
          </button>
        </div>

        <div class="auth-container" id="profileInfo">
          <div class="user-email" id="userEmailDisplay"></div>
          <button class="submit-btn secondary-btn" onclick="handleSignOut()">
            로그아웃
          </button>

          <div class="my-posts-header">내가 남긴 사유들</div>
          <div id="myPostsList"></div>
        </div>
      </div>
    </div>

    <div class="bottom-sheet" id="commentSheet">
      <div class="sheet-header">
        <div class="sheet-title">사유 나누기</div>
        <button class="close-btn" onclick="closeSheet('commentSheet')">
          ✕
        </button>
      </div>
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-area">
        <input
          type="text"
          id="commentInput"
          class="comment-input"
          placeholder="공감이나 의견을 남겨주세요."
        />
        <button class="comment-submit-btn" onclick="submitComment()">
          등록
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
        <span class="material-symbols-outlined nav-icon">home</span
        ><span class="nav-text">홈</span>
      </div>
      <div class="nav-item" id="nav-explore" onclick="switchTab('explore')">
        <span class="material-symbols-outlined nav-icon">search</span
        ><span class="nav-text">탐색</span>
      </div>
      <div
        class="nav-item write-btn"
        id="nav-write"
        onclick="switchTab('write')"
      >
        <span class="material-symbols-outlined nav-icon">add_circle</span
        ><span class="nav-text">글쓰기</span>
      </div>
      <div class="nav-item" id="nav-noti" onclick="switchTab('noti')">
        <span class="material-symbols-outlined nav-icon">notifications</span
        ><span class="nav-text">알림</span>
      </div>
      <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">
        <span class="material-symbols-outlined nav-icon">person</span
        ><span class="nav-text">프로필</span>
      </div>
    </nav>
  </body>
</html>
