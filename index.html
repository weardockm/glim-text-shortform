<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>글림 - 텍스트 숏폼</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body,
      html {
        height: 100%;
        background-color: #0d0d0d;
        color: #f5f5f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        overflow: hidden;
      }

      /* 헤더 영역 */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        background: linear-gradient(
          to bottom,
          rgba(13, 13, 13, 0.8),
          transparent
        );
      }
      .logo {
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: 1px;
        color: #fff;
      }
      .write-trigger-btn {
        background: #fff;
        color: #0d0d0d;
        border: none;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.85rem;
        cursor: pointer;
      }

      /* 피드 영역 (스냅 스크롤) */
      .feed {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
      }
      .feed::-webkit-scrollbar {
        display: none;
      }

      /* 개별 포스트 */
      .post {
        height: 100vh;
        scroll-snap-align: start;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 2.5rem;
      }
      .text-content {
        font-size: 1.35rem;
        line-height: 1.75;
        text-align: center;
        word-break: keep-all;
        max-width: 450px;
        font-weight: 400;
        color: #e5e5e5;
      }
      .author-info {
        position: absolute;
        bottom: 60px;
        left: 20px;
      }
      .author-name {
        font-size: 1rem;
        font-weight: bold;
        margin-bottom: 4px;
        color: #fff;
      }

      /* 우측 상호작용 버튼 */
      .side-actions {
        position: absolute;
        right: 15px;
        bottom: 60px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        align-items: center;
      }
      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 1.6rem;
        cursor: pointer;
        user-select: none;
      }
      .action-count {
        font-size: 0.75rem;
        margin-top: 4px;
        color: #aaa;
      }
      .report-btn {
        font-size: 1rem;
        color: #444;
        margin-top: 10px;
        transition: color 0.2s;
      }
      .report-btn:hover {
        color: #ff3b30;
      }

      /* 하단 시트 (글쓰기 모달) */
      .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 70%;
        background-color: #1a1a1a;
        border-radius: 20px 20px 0 0;
        z-index: 100;
        transition: bottom 0.3s ease;
        padding: 25px;
        box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.5);
      }
      .bottom-sheet.open {
        bottom: 0;
      }
      .sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .sheet-title {
        font-size: 1.1rem;
        font-weight: bold;
      }
      .close-btn {
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: #aaa;
      }
      .textarea-wrapper {
        position: relative;
        width: 100%;
        height: 60%;
      }
      .post-textarea {
        width: 100%;
        height: 100%;
        background: #262626;
        border: 1px solid #333;
        border-radius: 12px;
        color: #fff;
        padding: 15px;
        font-size: 1.05rem;
        resize: none;
        line-height: 1.5;
      }
      .post-textarea:focus {
        outline: 1px solid #fff;
      }
      .char-count {
        position: absolute;
        bottom: 10px;
        right: 15px;
        font-size: 0.8rem;
        color: #888;
      }
      .submit-btn {
        width: 100%;
        background: #fff;
        color: #0d0d0d;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1rem;
        margin-top: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">글림</div>
      <button class="write-trigger-btn" onclick="openBottomSheet()">
        글쓰기
      </button>
    </div>

    <div class="feed" id="postFeed">
      <div
        style="
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          color: #888;
        "
      >
        문장을 불러오는 중...
      </div>
    </div>

    <div class="bottom-sheet" id="writeSheet">
      <div class="sheet-header">
        <div class="sheet-title">새로운 사유 등록</div>
        <button class="close-btn" onclick="closeBottomSheet()">✕</button>
      </div>
      <div class="textarea-wrapper">
        <textarea
          class="post-textarea"
          id="postContent"
          maxlength="300"
          placeholder="뇌를 깨우는 나만의 짧은 문장을 적어주세요. (최대 300자)"
          oninput="updateCharCount()"
        ></textarea>
        <div class="char-count" id="charCount">0 / 300</div>
      </div>
      <button class="submit-btn" onclick="submitPost()">글림 등록하기</button>
    </div>

    <script>
      // ⚠️ 이름 충돌 에러 해결: 변수명을 supabase 대신 client로 변경했습니다.
      const SUPABASE_URL = "https://qdnpeliqtxdglqewbvgg.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_mwYlhge63nnNjL9lAFhxRw_fxRtRGvO";
      const client = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      // 피드 가져오기 (신고 5회 미만 글만 최신순 정렬)
      async function fetchPosts() {
        const { data, error } = await client
          .from("posts")
          .select("*")
          .lt("reports_count", 5)
          .order("created_at", { ascending: false });

        if (error) {
          document.getElementById("postFeed").innerHTML =
            `<div style="height:100vh; display:flex; justify-content:center; align-items:center; color:#ff3b30;">데이터 로드 오류: ${error.message}</div>`;
          return;
        }

        const feedContainer = document.getElementById("postFeed");
        feedContainer.innerHTML = "";

        if (data.length === 0) {
          feedContainer.innerHTML = `<div style="height:100vh; display:flex; justify-content:center; align-items:center; color:#888;">첫 번째 문장을 공유해 보세요!</div>`;
          return;
        }

        data.forEach((post) => {
          const postElement = document.createElement("div");
          postElement.className = "post";
          postElement.innerHTML = `
                  <div class="text-content">${post.content.replace(/\n/g, "<br>")}</div>
                  <div class="author-info">
                      <div class="author-name">@${post.author}</div>
                  </div>
                  <div class="side-actions">
                      <div class="action-btn" onclick="incrementMetric('${post.id}', 'likes_count', this)">
                          <span>❤️</span>
                          <span class="action-count">${post.likes_count}</span>
                      </div>
                      <div class="action-btn" onclick="incrementMetric('${post.id}', 'dislikes_count', this)">
                          <span>👎</span>
                          <span class="action-count">${post.dislikes_count}</span>
                      </div>
                      <div class="action-btn report-btn" onclick="reportPost('${post.id}')" title="신고">
                          🚨
                      </div>
                  </div>
              `;
          feedContainer.appendChild(postElement);
        });
      }

      // 좋아요 / 싫어요 실시간 증가 반영
      async function incrementMetric(postId, column, element) {
        const countSpan = element.querySelector(".action-count");
        let currentCount = parseInt(countSpan.innerText);
        countSpan.innerText = currentCount + 1; // UI 선반영

        const { data } = await client
          .from("posts")
          .select(column)
          .eq("id", postId)
          .single();
        await client
          .from("posts")
          .update({ [column]: (data[column] || 0) + 1 })
          .eq("id", postId);
      }

      // 신고 기능 (5회 누적 시 자동 검열 블라인드)
      async function reportPost(postId) {
        if (
          !confirm(
            "이 문장을 신고하시겠습니까? 5회 누적 시 자동 블라인드 처리됩니다.",
          )
        )
          return;

        const { data } = await client
          .from("posts")
          .select("reports_count")
          .eq("id", postId)
          .single();
        const newReportCount = (data.reports_count || 0) + 1;

        await client
          .from("posts")
          .update({ reports_count: newReportCount })
          .eq("id", postId);
        alert("신고가 접수되었습니다.");
        fetchPosts();
      }

      // 새로운 게시글 등록
      async function submitPost() {
        const content = document.getElementById("postContent").value.trim();
        if (!content) {
          alert("내용을 입력해주세요.");
          return;
        }
        if (content.length < 5) {
          alert("최소 5자 이상 작성해주세요. 뇌를 깨우는 공간입니다.");
          return;
        }

        const { error } = await client
          .from("posts")
          .insert([{ content: content }]);

        if (error) {
          alert("등록에 실패했습니다.");
        } else {
          document.getElementById("postContent").value = "";
          closeBottomSheet();
          fetchPosts(); // 피드 갱신
        }
      }

      /* UI 제어 함수들 */
      function openBottomSheet() {
        document.getElementById("writeSheet").classList.add("open");
      }
      function closeBottomSheet() {
        document.getElementById("writeSheet").classList.remove("open");
      }
      function updateCharCount() {
        const len = document.getElementById("postContent").value.length;
        document.getElementById("charCount").innerText = `${len} / 300`;
      }

      // 초기 구동 실행
      fetchPosts();
    </script>
  </body>
</html>
