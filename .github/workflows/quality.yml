name: Quality

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:e2e:install:ci
      - run: npm run check
      - run: npm test
      - run: npm run test:e2e:smoke
      - run: npm run security:static
      - run: npm audit --audit-level=high
      - run: npm run sbom
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            .omo/evidence/glim-production-roadmap/task-1/
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
