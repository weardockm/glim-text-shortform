<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>글림 - 관리자 센터</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js?v=8" defer></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body,
      html {
        height: 100%;
        background-color: #050505;
        color: #f0f0f0;
        font-family: -apple-system, sans-serif;
        overflow-y: auto;
      }
      .page-container {
        padding: 40px 25px;
        max-width: 600px;
        margin: 0 auto;
      }
      .admin-badge {
        background: #ff3b30;
        color: #fff;
        font-size: 0.85rem;
        padding: 6px 12px;
        border-radius: 6px;
        font-weight: bold;
        margin-bottom: 20px;
        display: inline-block;
        letter-spacing: 1px;
      }
      .page-title {
        font-size: 1.5rem;
        margin-bottom: 30px;
        font-weight: bold;
        color: #fff;
      }
      .back-btn {
        background: #222;
        color: #fff;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 30px;
        font-size: 0.95rem;
      }

      /* 📢 공지사항 작성 섹션 CSS 추가 */
      .notice-section {
        background: #111;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 40px;
      }
      .notice-textarea {
        width: 100%;
        height: 120px;
        background: #050505;
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        padding: 15px;
        font-size: 1rem;
        resize: none;
        margin-bottom: 15px;
        font-family: "Noto Serif KR", serif;
      }
      .notice-textarea:focus {
        outline: none;
        border-color: #666;
      }
      .submit-notice-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
      }

      /* 신고 리스트 관련 CSS */
      #adminReportList {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .my-post-item {
        background: rgba(255, 59, 48, 0.05);
        border: 1px solid #ff3b30;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .report-tag {
        color: #ff9500;
        font-size: 0.85rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .report-review-card {
        padding: 18px;
        border: 1px solid #2d2d2d;
        border-radius: 12px;
        background: #101010;
      }
      .report-review-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .report-target-badge {
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(255, 149, 0, 0.13);
        color: #ffad33;
        font-size: 0.74rem;
        font-weight: 700;
      }
      .report-review-date {
        color: #696969;
        font-size: 0.74rem;
        font-family: -apple-system, sans-serif;
      }
      .report-review-reason {
        margin-bottom: 9px;
        color: #ff7068;
        font-size: 0.94rem;
        font-weight: 700;
      }
      .report-review-content {
        padding: 13px;
        border-radius: 8px;
        background: #090909;
        color: #f0f0f0;
        font-size: 1rem;
        line-height: 1.6;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .report-review-author,
      .report-review-details {
        margin-top: 9px;
        color: #888;
        font-size: 0.8rem;
        line-height: 1.5;
        font-family: -apple-system, sans-serif;
        overflow-wrap: anywhere;
      }
      .report-review-details {
        padding: 10px;
        border-left: 2px solid #555;
        background: rgba(255, 255, 255, 0.025);
        color: #aaa;
      }
      .report-review-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 15px;
      }
      .moderation-action-btn {
        min-height: 36px;
        padding: 8px 11px;
        border: 1px solid #353535;
        border-radius: 8px;
        background: #1b1b1b;
        color: #ddd;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .moderation-action-btn.secondary {
        color: #aaa;
      }
      .moderation-action-btn.warning {
        border-color: rgba(255, 149, 0, 0.35);
        color: #ffad33;
      }
      .moderation-action-btn.danger {
        border-color: rgba(255, 59, 48, 0.36);
        color: #ff6b62;
      }
      .my-post-content {
        font-size: 1.05rem;
        color: #fff;
        line-height: 1.5;
        font-family: "Noto Serif KR", serif;
        margin-bottom: 10px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .delete-post-btn {
        background: #ff3b30;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 0.9rem;
      }
      .coming-soon {
        color: #888;
        text-align: center;
        padding: 50px 0;
        line-height: 1.6;
      }
      /* 📢 추가할 CSS: 공지사항 제목 입력창 스타일 */
      .notice-title-input {
        width: 100%;
        background: #050505;
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        padding: 15px;
        font-size: 1.1rem;
        margin-bottom: 10px;
        font-family: "Noto Serif KR", serif;
      }
      .notice-title-input:focus {
        outline: none;
        border-color: #666;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="admin-badge">ADMIN MODE</div>
      <div class="page-title">신고 관리 및 공지센터</div>
      <button class="back-btn" onclick="location.href = 'index.html'">
        ← 일반 서비스로 돌아가기
      </button>

      <div class="notice-section">
        <h2 style="color: #fff; font-size: 1.2rem; margin-bottom: 15px">
          📢 공지사항 작성
        </h2>
        <input
          type="text"
          id="adminNoticeTitle"
          class="notice-title-input"
          placeholder="공지사항 제목"
        />
        <textarea
          id="adminNoticeContent"
          class="notice-textarea"
          placeholder="공지사항 내용 (줄바꿈이 그대로 반영됩니다)"
        ></textarea>
        <button class="submit-notice-btn" onclick="submitNotice()">
          공지 등록하기
        </button>
      </div>

      <h2 style="color: #fff; font-size: 1.2rem; margin-bottom: 15px">
        🚨 신고 검토 대기
      </h2>
      <div id="adminReportList">
        <div class="coming-soon">보안 인가를 확인하는 중입니다...</div>
      </div>
      <h2
        style="
          color: #fff;
          font-size: 1.2rem;
          margin-bottom: 15px;
          margin-top: 50px;
        "
      >
        📢 등록된 공지사항 관리
      </h2>
      <div id="adminNoticeList">
        <div class="coming-soon">공지사항을 불러오는 중...</div>
      </div>
    </div>
  </body>
</html>
